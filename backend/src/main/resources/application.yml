server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/course_doc_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  elasticsearch:
    uris: http://localhost:9200

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

app:
  search:
    es-enabled: true
  nlp:
    base-url: http://localhost:8000
  file:
    upload-dir: uploads
